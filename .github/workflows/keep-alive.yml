name: Keep Alive

on:
  schedule:
    # Run every 5 minutes to keep Render awake (free tier sleeps after 15m)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Application
        env:
          URL: ${{ secrets.APP_URL || 'https://competitorwatcher.pt' }}
        run: |
          echo "Pinging $URL..."
          curl -I $URL
