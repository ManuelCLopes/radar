name: Feature request
description: Suggest a concrete improvement to the product or repository.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or maintainer problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful when there are tradeoffs.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Links, screenshots, examples, or constraints.
