name: Bug report
description: Report a reproducible problem in the app or repository.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security vulnerabilities, do not open a public issue. Use the security policy instead:
        https://github.com/ManuelCLopes/radar/security/policy
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / OS / deploy target / commit SHA if known.
      placeholder: macOS + Chrome 124, Vercel production, commit abc123
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste stack traces or attach images if available.
